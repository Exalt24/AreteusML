name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests with coverage
        run: uv run pytest --cov=backend --cov=ml --cov-report=xml --cov-report=term-missing -m "not slow and not gpu"

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Install pip-audit
        run: uv pip install pip-audit

      # Advisory only: pip-audit surfaces upstream CVEs but does not gate the build.
      # Pinned ML deps (torch, transformers, onnx) carry advisories that either have no
      # upstream fix yet (e.g. torch CVE-2025-3000) or would require breaking major bumps,
      # so the scan reports findings without failing CI on issues we cannot resolve here.
      - name: Run vulnerability scan
        continue-on-error: true
        run: uv run pip-audit
